# 应用升级系统 - Docker Compose
# 使用前请复制 .env.example 为 .env 并按需修改（端口、SECRET_KEY、API_TOKEN 等）

services:
  app:
    build: .
    container_name: upgrade_manage
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
    volumes:
      # 持久化数据库与上传缓存
      - ./data:/app/data
      - ./uploads:/app/uploads
      # 挂载主机 /opt，便于上传配置中的目标路径指向 /opt/xxx（如 /opt/myapp/release）
      - /opt:/opt
