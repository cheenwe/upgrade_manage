                        <form class="mb-4">
                            <div class="mb-3">
                                <label class="form-label">app</label>
                                <input type="text" name="app" id="app" class="form-control" autocomplete="off" placeholder="请输入应用名" value="wechat">
                                <div class="form-hint">必填： 应用名， 当前需要升级的程序名称</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">version</label>
                                <input type="text" name="version" id="version" class="form-control" placeholder="请输入设备当前版本号" autocomplete="off" value="1.1">
                                <div class="form-hint">必填： 设备当前版本号</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">sn</label>
                                <input type="text" name="sn" id="sn" class="form-control" placeholder="请输入设备SN " autocomplete="off" value="66253554">
                                <div class="form-hint">必填： 设备唯一标识符SN </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">uuid</label>
                                <input type="text" name="uuid" id="uuid" class="form-control" placeholder="请输入设备uuid " autocomplete="off">
                                <div class="form-hint">选填： 设备唯一标识符uuid </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">remark</label>
                                <input type="text" name="remark" id="remark" class="form-control" placeholder="请输入设备remark " autocomplete="off">
                                <div class="form-hint">预留字段： 备注 </div>
                            </div>
                            <div class="mb-3">
                                <button type="button" class="btn btn-primary" onclick="SubmitTest()">立即请求</button>
                            </div>
                        </form>

                        <div class="fw-bold mb-2">返回数据：</div>
                        <hr>

    <script type="text/javascript">
        var result_div = document.getElementById("result");

        var newp = document.createElement("p");
        //  刷新当前页面
        function reloadPage() {
            window.location.reload()
        }

        //  后退
        function goBack() {
            window.history.back()
        }

        //  前进
        function goForward() {
            window.history.forward()
        }

        function select_all() {
            elems = $(".formcheck [name='bulk_ids[]']");
            // console.log(elems)
            // console.log(elems)
            // console.log(elems)
            if ($('#selected_all').is(':checked')) {
                $(elems).prop('checked', true);
            } else {
                $(elems).prop('checked', false);
            }
        }

        function SubmitTest() {
            app = document.getElementById("app").value
            version = document.getElementById("version").value
            sn = document.getElementById("sn").value
            uuid = document.getElementById("uuid").value
            remark = document.getElementById("remark").value
            data = {
                "app": app,
                "version": version,
                "sn": sn,
                "uuid": uuid,
                "remark": remark,
            }

            console.log(data);
            // 发送 POST 请求
            axios({
                    method: 'post',
                    url: '/api/v1/version',
                    data: data
                }).then(function(response) {
                    console.log(response.data);
                    $.notify("提交数据成功!", "success");
                    res = response.data
                    new_link = "<div class='mb-2'><span class='text-muted'>code:</span> " + res.code + "</div><div class='mb-2'><span class='text-muted'>success:</span> " + res.success + "</div><div class='mb-2'><span class='text-muted'>md5:</span> " + res.md5 + "</div><div class='mb-2'><span class='text-muted'>is_upgrade:</span> " + res.is_upgrade + "</div><div class='mb-2'><span class='text-muted'>upgrade_url:</span> " + res.upgrade_url + "</div><div class='mb-2'><span class='text-muted'>msg:</span> " + res.msg + "</div>"
                    newp.innerHTML = new_link;
                    result_div.appendChild(newp);

                })
                .catch(function(error) {
                    console.log(error);
                });
        }
    </script>
