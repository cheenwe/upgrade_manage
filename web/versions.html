    <script>
    (function() {
        var allVersions = [];
        var currentPage = 1;
        var pageSize = 12;
        var token = localStorage.getItem("token");
        var headers = token ? { "Authorization": "Bearer " + token } : {};

        function escapeHtml(s) {
            if (s == null || s === "") return "—";
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function renderTable() {
            var total = allVersions.length;
            var totalPages = Math.max(1, Math.ceil(total / pageSize));
            currentPage = Math.min(Math.max(1, currentPage), totalPages);
            var start = (currentPage - 1) * pageSize;
            var pageData = allVersions.slice(start, start + pageSize);

            var baseUrl = window.location.origin;
            var wrap = document.getElementById("versionsGridBody");
            wrap.innerHTML = pageData.map(function(d) {
                var cfg = escapeHtml(d.config_name);
                var pkg = escapeHtml(d.package_name);
                var ver = escapeHtml(d.version);
                var time = escapeHtml(d.updated_at);
                var configId = (d.config_id != null ? d.config_id : "");
                var copyBtn = "<button type=\"button\" class=\"btn btn-sm btn-outline-primary\" onclick=\"copyUploadCommand(" + configId + ")\" title=\"复制 curl 上传命令\">复制上传命令</button>";
                return "<div class=\"col-12 col-sm-6 col-lg-4\">" +
                    "<div class=\"card\">" +
                    "<div class=\"card-header d-flex align-items-center justify-content-between py-2\">" +
                    "<span class=\"card-title mb-0\">" + pkg + "</span>" +
                    "<span class=\"badge bg-primary\">" + ver + "</span>" +
                    "</div>" +
                    "<div class=\"card-body py-2\">" +
                    "<table class=\"table table-sm table-vcenter mb-0 card-table\">" +
                    "<tbody>" +
                    "<tr><td class=\"text-muted w-25\">配置名</td><td>" + cfg + "</td></tr>" +
                    "<tr><td class=\"text-muted\">最后更新</td><td>" + time + "</td></tr>" +
                    "</tbody></table>" +
                    "<div class=\"mt-2\">" + copyBtn + "</div>" +
                    "</div></div></div>";
            }).join("");

            document.getElementById("versionsSummary").textContent = "共 " + total + " 条";
            if (total === 0) document.getElementById("versionsSummary").textContent = "暂无数据";

            var ul = document.getElementById("versionsPagination");
            ul.innerHTML = "";
            ul.appendChild(linkItem("上一页", currentPage > 1 ? currentPage - 1 : null));
            for (var i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2))
                    ul.appendChild(linkItem(String(i), i === currentPage ? null : i));
                else if (i === currentPage - 3 || i === currentPage + 3)
                    ul.appendChild(linkItem("…", null));
            }
            ul.appendChild(linkItem("下一页", currentPage < totalPages ? currentPage + 1 : null));
        }

        function linkItem(text, page) {
            var li = document.createElement("li");
            li.className = "page-item" + (page === null ? " disabled" : "");
            var a = document.createElement("a");
            a.className = "page-link";
            a.href = page === null ? "#" : "javascript:void(0)";
            a.textContent = text;
            if (page !== null) a.onclick = function() { currentPage = page; renderTable(); };
            li.appendChild(a);
            return li;
        }

        function loadVersions() {
            axios.get("/api/package-versions", { headers: headers })
                .then(function(res) {
                    allVersions = Array.isArray(res.data.data) ? res.data.data : [];
                    currentPage = 1;
                    renderTable();
                })
                .catch(function() { $.notify("获取数据失败", "error"); });
        }

        window.copyUploadCommand = function(configId) {
            var baseUrl = window.location.origin;
            var curlCmd = "curl -X POST -H \"Authorization: Bearer ${API_TOKEN}\" -F \"file=@./your-package.zip\" -F \"config_id=" + configId + "\" \"" + baseUrl + "/api/upload-by-token\"";
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(curlCmd).then(function() {
                    if (typeof $.notify === "function") $.notify("已复制到剪贴板", "success");
                }).catch(function() { fallbackCopy(curlCmd); });
            } else {
                fallbackCopy(curlCmd);
            }
        };
        function fallbackCopy(text) {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand("copy");
                if (typeof $.notify === "function") $.notify("已复制到剪贴板", "success");
            } catch (e) {}
            document.body.removeChild(ta);
        }

        document.getElementById("versionsPageSize").onchange = function() {
            pageSize = parseInt(this.value, 10);
            currentPage = 1;
            renderTable();
        };

        loadVersions();
    })();
    </script>
