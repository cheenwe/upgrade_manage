    <script type="text/javascript">
        //  刷新当前页面
        function reloadPage() {
            window.location.reload()
        }

        //  后退
        function goBack() {
            window.history.back()
        }

        //  前进
        function goForward() {
            window.history.forward()
        }

        // $(function() { 
        //     window.prettyPrint && prettyPrint();
        // 		$('.datepicker').datepicker({
        // 			date: '<%=( Date.today+1.year).strftime("%Y-%m-%d")%>',
        //       format: 'yyyy-mm-dd',
        //       autoHide: true,
        //       zIndex: 2048,
        //       weekStart: 1,
        //       startView: 0, // 1,2
        //       language: 'zh-CN'
        // 		});
        // });

        $(document).on('turbolinks:load', function() {
        if ($('form').length == 2 || $('form').length == 1) {
                $('form').parsley().on('field:validated', function() {
                    var ok;
                    ok = $('.parsley-error').length === 0;
                    $('.bs-callout-info').toggleClass('hidden', !ok);
                    $('.bs-callout-warning').toggleClass('hidden', ok);
                    console.log(">>noooooo>>>>>");
                }).on('form:submit', function() {
                    return console.log(">>>>>>>");
                    return false; // Don't submit form for this demo
                });
            };

            $.notify.defaults({
                autoHide: false
            });
            // 避免 Turbolinks 来回切换时重复创建 FilePond
            var inputElement = document.querySelector('input[type="file"].filepond');
            if (!inputElement) return;
            if (window.pond) {
                try { window.pond.destroy(); } catch (e) {}
                window.pond = null;
            }

            // Create the FilePond instance
            var pond = FilePond.create(inputElement, {
                allowMultiple: false,
                allowReorder: true
            });

            // function CheckFile() {
            //     legend_name = document.getElementsByTagName("legend")[0]
            //     console.log(legend_name)
            // }

            FilePond.setOptions({
                allowMultiple: false,
                allowReorder: true,
                server: {
                    process: (fieldName, file, metadata, load, error, progress, abort, transfer, options) => {
                        var name = file.name.toLowerCase();
                        var radio = document.querySelector('input[name="uploadConfigId"]:checked');
                        var configId = radio ? radio.value : "";
                        if (!configId) {
                            $.notify("请先选择上传配置", "error");
                            error("请选择上传配置");
                            return { abort: function() {} };
                        }
                        var allowed = name.endsWith(".jar") || name.endsWith(".zip") || name.endsWith(".tar") || name.endsWith(".tar.gz") || name.endsWith(".tgz");
                        if (!allowed) {
                            $.notify("请上传 .jar / .zip / .tar / .tar.gz 文件", "error");
                            error("不支持的文件类型");
                            return { abort: function() {} };
                        }
                        const formData = new FormData();
                        formData.append(fieldName, file, file.name);
                        var token = localStorage.getItem("token");
                        if (token) formData.append("token", token);
                        formData.append("config_id", configId);

                        const request = new XMLHttpRequest();
                        request.open('POST', '/api/uploads');
                        if (token) request.setRequestHeader('Authorization', 'Bearer ' + token);
                        request.upload.onprogress = (e) => { progress(e.lengthComputable, e.loaded, e.total); };
                        request.onload = function() {
                            if (request.status >= 200 && request.status < 300) {
                                var result = JSON.parse(request.responseText);
                                var versionStr = result.version || result.version_seq;
                                var msg = result.msg || "上传成功";
                                if (versionStr) msg = "上传成功，版本号：" + versionStr;
                                $.notify(msg, "success");
                                var fileName = (file && file.name || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
                                var resultEl = document.getElementById("result");
                                if (resultEl) {
                                    resultEl.innerHTML = "<span class=\"text-success\">已成功上传包名： " + fileName + "</span><br><span class=\"text-success\">版本号：" + (versionStr || "") + "</span>";
                                }
                                load(request.responseText);
                                if (pond) pond.removeFiles();
                            } else {
                                var err = "上传失败";
                                try { var r = JSON.parse(request.responseText); if (r.msg) err = r.msg; } catch(e) {}
                                $.notify(err, "error");
                                error(err);
                            }
                        };
                        request.onerror = function() { $.notify("网络错误", "error"); error("网络错误"); };
                        request.send(formData);
                        return { abort: function() { request.abort(); } };
                    },
                }
            });
            window.pond = pond;

            // 加载上传配置为单选，默认选中第一个；若 URL 带 config_id 则预选对应配置
            // 先清空容器，避免 Turbolinks 不刷新时重复追加选项
            var urlParams = new URLSearchParams(window.location.search);
            var presetConfigId = urlParams.get("config_id");
            if (presetConfigId) try { presetConfigId = parseInt(presetConfigId, 10); } catch (e) { presetConfigId = null; }
            var token = localStorage.getItem("token");
            var box = document.getElementById("uploadConfigRadios");
            if (box) box.innerHTML = "";
            if (token && box) {
                axios.get("/api/upload-configs", { headers: { "Authorization": "Bearer " + token } }).then(function(r) {
                    if (!box || !r.data.success || !r.data.data) return;
                    box.innerHTML = "";
                    var list = r.data.data;
                    var hasPreset = presetConfigId != null && list.some(function(x) { return Number(x.id) === presetConfigId; });
                    var actionText = { copy: "仅复制", unzip: "unzip 解压", tar: "tar 解压" };
                    list.forEach(function(c, i) {
                        var col = document.createElement("div");
                        col.className = "col";
                        var label = document.createElement("label");
                        label.className = "form-selectgroup-item w-100";
                        var inp = document.createElement("input");
                        inp.type = "radio";
                        inp.name = "uploadConfigId";
                        inp.value = c.id;
                        inp.className = "form-selectgroup-input";
                        if (hasPreset && Number(c.id) === presetConfigId) inp.checked = true;
                        else if (!hasPreset && i === 0) inp.checked = true;
                        var span = document.createElement("span");
                        span.className = "form-selectgroup-label d-flex flex-column align-items-start p-2 text-start w-100";
                        span.innerHTML = "<strong class=\"small\">" + (c.name || "") + "</strong><span class=\"text-muted small d-block text-truncate\" style=\"min-width:0\">" + (c.target_path || "") + " · " + (actionText[c.action] || c.action) + "</span>";
                        label.appendChild(inp);
                        label.appendChild(span);
                        col.appendChild(label);
                        box.appendChild(col);
                    });
                    if (list.length === 0) box.innerHTML = "<p class=\"text-muted\">请先在「系统设置」中添加上传配置。</p>";
                }).catch(function() {});
            }
        });
    </script>
