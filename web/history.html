    <script>
    (function() {
        var allHistory = [];
        var currentPage = 1;
        var pageSize = 20;
        var token = localStorage.getItem("token");
        var headers = token ? { "Authorization": "Bearer " + token } : {};

        function formatSize(n) {
            if (n == null || n === "") return "-";
            if (n >= 1048576) return (n/1048576).toFixed(2) + " MB";
            if (n >= 1024) return (n/1024).toFixed(2) + " KB";
            return n + " B";
        }
        function downloadUrl(id) {
            return "/api/download/" + id + "?token=" + (token || "");
        }

        /** 路径默认只显示倒数第4个/ 之后的部分，不足则显示全文 */
        function pathShort(fullPath) {
            if (!fullPath) return "";
            var count = 0;
            for (var i = fullPath.length - 1; i >= 0; i--) {
                if (fullPath[i] === "/") {
                    count++;
                    if (count === 4) return fullPath.substring(i + 1);
                }
            }
            return fullPath;
        }

        function escapeHtml(s) {
            if (s == null) return "";
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function renderTable() {
            var total = allHistory.length;
            var totalPages = Math.max(1, Math.ceil(total / pageSize));
            currentPage = Math.min(Math.max(1, currentPage), totalPages);
            var start = (currentPage - 1) * pageSize;
            var pageData = allHistory.slice(start, start + pageSize);

            var tbody = document.getElementById("historyTableBody");
            tbody.innerHTML = pageData.map(function(d) {
                var fullPath = d.file_path || "";
                var shortPath = pathShort(fullPath);
                var pathTitle = fullPath ? " title=\"" + escapeHtml(fullPath) + "\"" : "";
                var pathCell = "<td class=\"text-break d-none d-md-table-cell\" style=\"max-width:200px;\" " + pathTitle + ">" + escapeHtml(shortPath) + "</td>";
                var download = (d.id != null && d.id !== "")
                    ? "<a class=\"btn btn-sm btn-primary\" href=\"" + downloadUrl(d.id) + "\" target=\"_blank\">下载</a>" : "-";
                return "<tr><td>" + (d.id || "") + "</td><td>" + escapeHtml(d.username || "") + "</td><td>" + escapeHtml(d.file_name || "") + "</td>" +
                    "<td>" + escapeHtml(d.file_type || "") + "</td><td>" + formatSize(d.file_size) + "</td>" + pathCell +
                    "<td>" + escapeHtml(d.created_at || "") + "</td><td>" + download + "</td></tr>";
            }).join("");

            document.getElementById("historySummary").textContent = "共 " + total + " 条";
            if (total === 0) document.getElementById("historySummary").textContent = "暂无数据";

            var ul = document.getElementById("historyPagination");
            ul.innerHTML = "";
            ul.appendChild(linkItem("上一页", currentPage > 1 ? currentPage - 1 : null));
            for (var i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2))
                    ul.appendChild(linkItem(String(i), i === currentPage ? null : i));
                else if (i === currentPage - 3 || i === currentPage + 3)
                    ul.appendChild(linkItem("…", null));
            }
            ul.appendChild(linkItem("下一页", currentPage < totalPages ? currentPage + 1 : null));
        }

        function linkItem(text, page) {
            var li = document.createElement("li");
            li.className = "page-item" + (page === null ? " disabled" : "");
            var a = document.createElement("a");
            a.className = "page-link";
            a.href = page === null ? "#" : "javascript:void(0)";
            a.textContent = text;
            if (page !== null) a.onclick = function() { currentPage = page; renderTable(); };
            li.appendChild(a);
            return li;
        }

        function loadHistory() {
            axios.get("/api/history", { headers: headers })
                .then(function(res) {
                    allHistory = Array.isArray(res.data.data) ? res.data.data : [];
                    currentPage = 1;
                    renderTable();
                })
                .catch(function() { $.notify("获取数据失败", "error"); });
        }

        document.getElementById("historyPageSize").onchange = function() {
            pageSize = parseInt(this.value, 10);
            currentPage = 1;
            renderTable();
        };

        loadHistory();
    })();
    </script>

    <script type="text/javascript">
        //  刷新当前页面
        function reloadPage() {
            window.location.reload()
        }

        //  后退
        function goBack() {
            window.history.back()
        }

        //  前进
        function goForward() {
            window.history.forward()
        }
    </script>
