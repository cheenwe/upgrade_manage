    <script>
    (function() {
        var token = localStorage.getItem("token");
        var headers = token ? { "Authorization": "Bearer " + token } : {};
        var actionText = { copy: "仅复制", unzip: "unzip 解压", tar: "tar 解压" };
        function loadConfigVersions() {
            var wrap = document.getElementById("configVersionCards");
            var placeholder = document.getElementById("configVersionPlaceholder");
            if (!wrap) return;
            axios.get("/api/upload-configs", { headers: headers })
                .then(function(r) {
                    var list = (r.data && r.data.success && r.data.data) ? r.data.data : [];
                    placeholder.remove();
                    if (list.length === 0) {
                        wrap.innerHTML = "<div class=\"col-12 text-muted py-4\">暂无上传配置，请先在 <a href=\"./settings.html\">系统设置</a> 中新增配置。</div>";
                        return;
                    }
                    list.forEach(function(c) {
                        var name = (c.name || "未命名").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        var ver = (c.current_version || "V1.0").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        var action = actionText[c.action] || c.action || "";
                        var desc = (c.description || "").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        var card = document.createElement("div");
                        card.className = "col-12 col-sm-6 col-lg-4";
                        card.innerHTML =
                            "<div class=\"card h-100\">" +
                            "  <div class=\"card-body\">" +
                            "    <div class=\"d-flex align-items-center mb-2\">" +
                            "      <span class=\"avatar avatar-sm bg-primary-lt bg-opacity-10 text-primary me-2\">" + (name.charAt(0) || "?") + "</span>" +
                            "      <h4 class=\"card-title mb-0\">" + name + "</h4>" +
                            "    </div>" +
                            "    <p class=\"text-muted small mb-2\">" + (desc || "—") + "</p>" +
                            "    <div class=\"mb-3\">" +
                            "      <span class=\"badge bg-primary-lt bg-opacity-10 text-primary\">当前版本 " + ver + "</span>" +
                            "      <span class=\"badge bg-azure-lt bg-opacity-10 text-azure ms-1\">" + action + "</span>" +
                            "    </div>" +
                            "    <div class=\"d-flex gap-2\">" +
                            "      <a href=\"./version.html?config_id=" + (c.id || "") + "\" class=\"btn btn-primary btn-sm\">上传该配置</a>" +
                            "      <a href=\"./versions.html\" class=\"btn btn-outline-secondary btn-sm\">查看版本</a>" +
                            "    </div>" +
                            "  </div>" +
                            "</div>";
                        wrap.appendChild(card);
                    });
                })
                .catch(function() {
                    if (placeholder) placeholder.textContent = "加载失败，请刷新重试";
                });
        }
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", loadConfigVersions);
        } else {
            loadConfigVersions();
        }
    })();
    </script>
    <script type="text/javascript">
        //  刷新当前页面

        }

        //  后退

            window.history.back()
        }

        //  前进
        function goForward() {
            window.history.forward()

        function ClickLogout() {
            $.notify("退出系统成功", "success");
            localStorage.setItem("token", "");
            localStorage.removeItem("username");
            localStorage.removeItem("is_admin");
            window.location.href = "./login.html";
        }
