            <div class="container-xl">
                <div class="page-header d-print-none">
                    <div class="row align-items-center">
                        <div class="col"><h2 class="page-title">系统设置</h2></div>
                    </div>
                </div>

                <div class="row row-cards">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title">上传配置</h3>
                                <button type="button" class="btn btn-primary btn-sm" onclick="showConfigForm()">新增配置</button>
                            </div>
                            <div class="card-body">
                                <p class="text-secondary">上传时选择一条配置，按「上传路径」与「上传后操作」执行。操作：仅复制 / unzip 解压 / tar 解压。</p>
                                <div class="table-responsive">
                                    <table class="table table-vcenter table-hover">
                                        <thead><tr><th>配置名</th><th>上传路径</th><th>上传后操作</th><th>当前版本号</th><th>说明</th><th width="120">操作</th></tr></thead>
                                        <tbody id="uploadConfigList"></tbody>
                                    </table>
                                </div>
                                <div id="configFormBox" class="mt-3 border rounded p-3 bg-light" style="display:none;">
                                    <h4 class="mb-3" id="configFormTitle">新增配置</h4>
                                    <div class="row mb-2">
                                        <div class="col-12 col-md-6">
                                            <label class="form-label">配置名</label>
                                            <input type="text" class="form-control" id="cfg_name" placeholder="如: JAR 文件">
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label class="form-label">上传路径</label>
                                            <input type="text" class="form-control" id="cfg_target_path" placeholder="相对根目录如 jar、dist 或绝对路径">
                                        </div>
                                    </div>
                                    <div class="row mb-2">
                                        <div class="col-12 col-md-6">
                                            <label class="form-label">上传后操作</label>
                                            <select class="form-select" id="cfg_action">
                                                <option value="copy">仅复制</option>
                                                <option value="unzip">unzip 解压</option>
                                                <option value="tar">tar 解压</option>
                                            </select>
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label class="form-label">当前版本号</label>
                                            <input type="text" class="form-control" id="cfg_current_version" placeholder="如 V1.0，上传后自动变为 V1.1">
                                        </div>
                                    </div>
                                    <div class="row mb-2">
                                        <div class="col-12">
                                            <label class="form-label">说明</label>
                                            <input type="text" class="form-control" id="cfg_description" placeholder="可选">
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary me-2" onclick="saveConfig()">保存</button>
                                    <button type="button" class="btn btn-secondary" onclick="hideConfigForm()">取消</button>
                                    <input type="hidden" id="cfg_id" value="">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header"><h3 class="card-title">自动清理</h3></div>
                            <div class="card-body">
                                <p class="text-secondary">清理超过指定月数的上传历史及对应文件（仅删除历史记录与 .jar 文件，dist 解压目录不删）。</p>
                                <div class="mb-3">
                                    <label class="form-label">保留最近（月）</label>
                                    <input type="number" class="form-control" id="keep_months" min="1" max="24" value="3" style="max-width:120px">
                                </div>
                                <button type="button" class="btn btn-primary me-2" onclick="saveCleanup()">保存配置</button>
                                <button type="button" class="btn btn-warning" onclick="runCleanup()">立即执行清理</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/axios.min.js"></script>
    <script src="./js/notify.js"></script>
    <script>
        function authHeaders() {
            var t = localStorage.getItem("token");
            return t ? { "Authorization": "Bearer " + t } : {};
        }
        function loadUploadConfigs() {
            axios.get("/api/upload-configs", { headers: authHeaders() }).then(function(r) {
                var list = (r.data.data || []);
                var actionText = { copy: "仅复制", unzip: "unzip 解压", tar: "tar 解压" };
                var html = list.length ? list.map(function(p) {
                    return "<tr><td>" + (p.name || "") + "</td><td><code>" + (p.target_path || "") + "</code></td><td>" + (actionText[p.action] || p.action) + "</td><td><strong>" + (p.current_version || "V1.0") + "</strong></td><td>" + (p.description || "-") + "</td><td><button class=\"btn btn-sm btn-outline-primary me-1\" onclick=\"editConfig(" + p.id + ")\">编辑</button><button class=\"btn btn-sm btn-outline-danger\" onclick=\"delConfig(" + p.id + ", '" + (p.name || "").replace(/'/g, "\\'") + "')\">删除</button></td></tr>";
                }).join("") : "<tr><td colspan=\"6\" class=\"text-muted\">暂无配置，请点击「新增配置」</td></tr>";
                document.getElementById("uploadConfigList").innerHTML = html;
            }).catch(function(e) {
                if (e.response && e.response.status === 403) { $.notify("仅管理员可访问", "error"); window.location.href = "./index.html"; }
            });
        }
        function showConfigForm() {
            document.getElementById("cfg_id").value = "";
            document.getElementById("cfg_name").value = "";
            document.getElementById("cfg_target_path").value = "";
            document.getElementById("cfg_action").value = "copy";
            document.getElementById("cfg_current_version").value = "V1.0";
            document.getElementById("cfg_description").value = "";
            document.getElementById("configFormTitle").textContent = "新增配置";
            document.getElementById("configFormBox").style.display = "block";
        }
        function hideConfigForm() {
            document.getElementById("configFormBox").style.display = "none";
        }
        function editConfig(id) {
            axios.get("/api/upload-configs", { headers: authHeaders() }).then(function(r) {
                var p = (r.data.data || []).find(function(x) { return x.id === id; });
                if (!p) return;
                document.getElementById("cfg_id").value = p.id;
                document.getElementById("cfg_name").value = p.name || "";
                document.getElementById("cfg_target_path").value = p.target_path || "";
                document.getElementById("cfg_action").value = p.action || "copy";
                document.getElementById("cfg_current_version").value = p.current_version || "V1.0";
                document.getElementById("cfg_description").value = p.description || "";
                document.getElementById("configFormTitle").textContent = "编辑配置";
                document.getElementById("configFormBox").style.display = "block";
            });
        }
        function saveConfig() {
            var id = document.getElementById("cfg_id").value;
            var name = document.getElementById("cfg_name").value.trim();
            var target_path = document.getElementById("cfg_target_path").value.trim();
            var action = document.getElementById("cfg_action").value;
            var current_version = document.getElementById("cfg_current_version").value.trim();
            var description = document.getElementById("cfg_description").value.trim();
            if (!name || !target_path) { $.notify("请填写配置名和上传路径", "error"); return; }
            var payload = { name: name, target_path: target_path, action: action, description: description };
            if (current_version) payload.current_version = current_version;
            var req = id
                ? axios.put("/api/upload-configs/" + id, payload, { headers: authHeaders() })
                : axios.post("/api/upload-configs", payload, { headers: authHeaders() });
            req.then(function() { $.notify("保存成功", "success"); hideConfigForm(); loadUploadConfigs(); })
                .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "保存失败", "error"); });
        }
        function delConfig(id, name) {
            if (!confirm("确定删除配置「" + name + "」吗？")) return;
            axios.delete("/api/upload-configs/" + id, { headers: authHeaders() })
                .then(function() { $.notify("已删除", "success"); loadUploadConfigs(); })
                .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "删除失败", "error"); });
        }
        function loadCleanup() {
            axios.get("/api/config/cleanup", { headers: authHeaders() }).then(function(r) {
                if (r.data.success && r.data.data && r.data.data.keep_months)
                    document.getElementById("keep_months").value = r.data.data.keep_months;
            }).catch(function() {});
        }
        function saveCleanup() {
            var m = parseInt(document.getElementById("keep_months").value, 10) || 3;
            axios.post("/api/config/cleanup", { keep_months: m }, { headers: authHeaders() })
                .then(function(r) { $.notify(r.data.msg || "保存成功", "success"); })
                .catch(function(e) { $.notify("保存失败", "error"); });
        }
        function runCleanup() {
            if (!confirm("确定要立即清理超过保留月数的历史记录吗？")) return;
            axios.post("/api/cleanup/run", {}, { headers: authHeaders() })
                .then(function(r) { $.notify(r.data.msg || "清理完成", "success"); })
                .catch(function(e) { $.notify("执行失败", "error"); });
        }
        function ClickLogout() {
            localStorage.setItem("token", "");
            localStorage.removeItem("username");
            localStorage.removeItem("is_admin");
            window.location.href = "./login.html";
        }
        $(function() { loadUploadConfigs(); loadCleanup(); });
    </script>
