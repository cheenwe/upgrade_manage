    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/notify.js"></script>
    <script>
        function authHeaders() {
            var t = localStorage.getItem("token");
            return t ? { "Authorization": "Bearer " + t } : {};
        }
        function loadUsers() {
            axios.get("/api/users", { headers: authHeaders() }).then(function(r) {
                var list = (r.data.data || []);
                var html = list.map(function(u) {
                    var roleText = (u.role || "").toLowerCase() === "admin" ? "管理员" : "普通用户";
                    var statusText = u.disabled ? "<span class=\"badge bg-danger\">已禁用</span>" : "<span class=\"badge bg-success\">正常</span>";
                    var btns = "<button class=\"btn btn-sm btn-outline-primary me-1\" onclick=\"editUser(" + u.id + ")\">编辑</button>";
                    btns += "<button class=\"btn btn-sm btn-outline-secondary me-1\" onclick=\"openPasswordModal(" + u.id + ", '" + (u.username || "").replace(/'/g, "\\'") + "')\">改密码</button>";
                    if (u.disabled) {
                        btns += "<button class=\"btn btn-sm btn-outline-success me-1\" onclick=\"setDisabled(" + u.id + ", false)\">启用</button>";
                    } else {
                        btns += "<button class=\"btn btn-sm btn-outline-warning me-1\" onclick=\"setDisabled(" + u.id + ", true)\">禁用</button>";
                    }
                    btns += "<button class=\"btn btn-sm btn-outline-danger\" onclick=\"delUser(" + u.id + ", '" + (u.username || "").replace(/'/g, "\\'") + "')\">删除</button>";
                    return "<tr><td>" + (u.id || "") + "</td><td>" + (u.username || "") + "</td><td>" + roleText + "</td><td>" + statusText + "</td><td>" + (u.created_at || "") + "</td><td>" + btns + "</td></tr>";
                }).join("") || "<tr><td colspan=\"6\" class=\"text-muted\">暂无用户</td></tr>";
                document.getElementById("userListBody").innerHTML = html;
            }).catch(function(e) {
                if (e.response && e.response.status === 403) { $.notify("仅管理员可访问", "error"); window.location.href = "./index.html"; }
                else { $.notify("加载失败", "error"); }
            });
        }
        function showUserForm() {
            document.getElementById("user_id").value = "";
            document.getElementById("user_username").value = "";
            document.getElementById("user_password").value = "";
            document.getElementById("user_role").value = "user";
            document.getElementById("userFormTitle").textContent = "新增用户";
            document.getElementById("userPasswordRow").style.display = "";
            document.getElementById("userFormBox").style.display = "block";
        }
        function hideUserForm() {
            document.getElementById("userFormBox").style.display = "none";
        }
        function editUser(id) {
            axios.get("/api/users", { headers: authHeaders() }).then(function(r) {
                var u = (r.data.data || []).find(function(x) { return x.id === id; });
                if (!u) return;
                document.getElementById("user_id").value = u.id;
                document.getElementById("user_username").value = u.username || "";
                document.getElementById("user_password").value = "";
                document.getElementById("user_role").value = (u.role || "user").toLowerCase() === "admin" ? "admin" : "user";
                document.getElementById("userFormTitle").textContent = "编辑用户";
                document.getElementById("userPasswordRow").style.display = "";
                document.getElementById("userFormBox").style.display = "block";
            });
        }
        function saveUser() {
            var id = document.getElementById("user_id").value;
            var username = document.getElementById("user_username").value.trim();
            var password = document.getElementById("user_password").value;
            var role = document.getElementById("user_role").value;
            if (!username || username.length < 3) { $.notify("用户名至少3位", "error"); return; }
            if (!id && (!password || password.length < 5)) { $.notify("新用户密码至少5位", "error"); return; }
            if (id) {
                var payload = { username: username, role: role };
                if (password && password.length >= 5) payload.new_password = password;
                axios.put("/api/users/" + id, payload, { headers: authHeaders() })
                    .then(function() { $.notify("保存成功", "success"); hideUserForm(); loadUsers(); })
                    .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "保存失败", "error"); });
            } else {
                axios.post("/api/users", { username: username, password: password, role: role }, { headers: authHeaders() })
                    .then(function() { $.notify("添加成功", "success"); hideUserForm(); loadUsers(); })
                    .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "添加失败", "error"); });
            }
        }
        function setDisabled(id, disabled) {
            axios.post("/api/users/" + id + "/disabled", { disabled: disabled }, { headers: authHeaders() })
                .then(function() { $.notify(disabled ? "已禁用" : "已启用", "success"); loadUsers(); })
                .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "操作失败", "error"); });
        }
        function openPasswordModal(id, username) {
            document.getElementById("pwd_user_id").value = id;
            document.getElementById("pwd_username").textContent = username;
            document.getElementById("new_password").value = "";
            var modal = new bootstrap.Modal(document.getElementById("modalPassword"));
            modal.show();
        }
        function submitPassword() {
            var id = document.getElementById("pwd_user_id").value;
            var newPassword = document.getElementById("new_password").value;
            if (!newPassword || newPassword.length < 5) { $.notify("密码至少5位", "error"); return; }
            axios.post("/api/users/" + id + "/password", { new_password: newPassword }, { headers: authHeaders() })
                .then(function() { $.notify("密码已修改", "success"); bootstrap.Modal.getInstance(document.getElementById("modalPassword")).hide(); loadUsers(); })
                .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "修改失败", "error"); });
        }
        function delUser(id, username) {
            if (!confirm("确定删除用户「" + username + "」吗？")) return;
            axios.delete("/api/users/" + id, { headers: authHeaders() })
                .then(function() { $.notify("已删除", "success"); loadUsers(); })
                .catch(function(e) { $.notify(e.response && e.response.data && e.response.data.msg ? e.response.data.msg : "删除失败", "error"); });
        }
        function ClickLogout() {
            localStorage.setItem("token", "");
            localStorage.removeItem("username");
            localStorage.removeItem("is_admin");
            window.location.href = "./login.html";
        }
        loadUsers();
    </script>
